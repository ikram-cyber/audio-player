    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top center, #1f180b 0%, #030303 60%);
            background-attachment: fixed;
        }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; color: transparent; }
        .luxury-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.8), rgba(5,5,5,0.9));
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.8);
            transition: all 0.4s ease;
        }
        .luxury-card:hover {
            border-color: rgba(212, 175, 55, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px -5px rgba(212, 175, 55, 0.15);
        }
        audio { width: 100%; height: 40px; border-radius: 8px; outline: none; }
        audio::-webkit-media-controls-panel {
            background-color: #0a0a0a;
            border: 1px solid rgba(212,175,55,0.2);
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #d4af37; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 500;
        }
        audio::-webkit-media-controls-play-button,
        audio::-webkit-media-controls-mute-button {
            filter: invert(70%) sepia(50%) saturate(400%) hue-rotate(5deg) brightness(100%) contrast(100%);
        }
        .disc-spin { animation: spin 10s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

    <script>
        document.addEventListener('play', function(e){
            var audios = document.getElementsByTagName('audio');
            for(var i = 0, len = audios.length; i < len;i++){
                if(audios[i] != e.target){
                    audios[i].pause();
                }
            }
        }, true);
    </script>
