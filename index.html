<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Audio Player | Ikram Cyber System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #030303; }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; color: transparent; }
        .luxury-card { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.2); }
        
        /* Custom Audio Player Styling */
        audio::-webkit-media-controls-panel {
            background-color: #1a1a1a;
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #d4af37;
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
        }
        audio::-webkit-media-controls-play-button,
        audio::-webkit-media-controls-mute-button {
            filter: invert(70%) sepia(40%) saturate(600%) hue-rotate(5deg) brightness(95%) contrast(90%);
        }
    </style>
</head>
<body class="text-slate-300 antialiased pb-20 selection:bg-yellow-600/30 min-h-screen flex flex-col">
    <main class="max-w-md mx-auto px-6 pt-16 space-y-10 flex-1 w-full">
        
        <div class="text-center space-y-4">
            <div class="w-16 h-16 mx-auto rounded-full border border-[#d4af37]/40 flex items-center justify-center bg-black/50 mb-4 shadow-[0_0_20px_rgba(212,175,55,0.2)]">
                <i class="fas fa-compact-disc text-3xl gold-text animate-spin-slow"></i>
            </div>
            <h1 class="font-luxury text-3xl font-bold tracking-tight text-white mt-4">
                Frequency <br><span class="gold-text italic">Vault</span>
            </h1>
            <p class="text-slate-400 text-[10px] uppercase tracking-[0.3em] font-light">
                Exclusive Audio Experience
            </p>
            <div class="w-12 h-[1px] bg-gradient-to-r from-transparent via-[#d4af37] to-transparent mx-auto mt-4"></div>
        </div>

        <div class="space-y-6">
            
            <div class="luxury-card rounded-2xl p-6 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 opacity-5 text-8xl"><i class="fas fa-sun"></i></div>
                <div class="relative z-10">
                    <h2 class="font-luxury text-[#fcf6ba] text-lg mb-1">The Sunlit Room</h2>
                    <p class="text-[9px] text-slate-400 uppercase tracking-widest mb-4">Healing 432Hz & Miracle 528Hz</p>
                    
                    <audio controls class="w-full h-10 rounded-full outline-none">
                        <source src="sunlit-room.mp4" type="audio/mp4">
                        Browser Anda tidak mendukung elemen audio.
                    </audio>
                </div>
            </div>

            <div class="luxury-card rounded-2xl p-6 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 opacity-5 text-8xl"><i class="fas fa-wave-square"></i></div>
                <div class="relative z-10">
                    <h2 class="font-luxury text-[#fcf6ba] text-lg mb-1">Mending The Gold Thread</h2>
                    <p class="text-[9px] text-slate-400 uppercase tracking-widest mb-4">Theta Original (3 Mins)</p>
                    
                    <audio controls class="w-full h-10 rounded-full outline-none">
                        <source src="gold-thread.mp4" type="audio/mp4">
                        Browser Anda tidak mendukung elemen audio.
                    </audio>
                </div>
            </div>

        </div>

        <div class="pt-8 text-center">
            <a href="https://ikram-cyber.github.io/audio-hub" class="text-[10px] text-slate-500 hover:text-[#d4af37] uppercase tracking-widest transition-colors flex items-center justify-center gap-2">
                <i class="fas fa-shopping-cart"></i> Dapatkan Akses Penuh
            </a>
        </div>

    </main>

    <footer class="pt-12 pb-6 text-center mt-8 border-t border-white/5">
        <p class="text-[9px] text-slate-700 uppercase tracking-[0.4em] font-light">&copy; 2026 Ikram Cyber System</p>
    </footer>
</body>
</html>
